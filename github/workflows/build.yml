name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Code & Fix Errors
        run: |
          unzip "ultimate-study-&-revision-engine.zip" -d study-app
          cd study-app
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Build the App
        run: |
          cd study-app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Give me the APK
        uses: actions/upload-artifact@v4
        with:
          name: Ultimate-Study-Tracker-APK
          path: study-app/app/build/outputs/apk/debug/app-debug.apk
